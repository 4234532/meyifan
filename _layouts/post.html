<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }} | YIFAN</title> 
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}"> 
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="{{ site.baseurl }}/" class="logo">YIFAN</a>
        </div> 
    </nav>

    <div class="container">
        <article class="widget" style="padding: 50px; margin-top: 40px; border-radius: 12px; background-color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <h1>{{ page.title }}</h1> 
            <div class="post-meta" style="color: #b2bec3; margin-bottom: 20px;">{{ page.date | date: "%Y-%m-%d" }}</div> 
            
            <div class="post-body" style="line-height: 1.8;">
                {{ content }} 
            </div>
            
            <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee;">
                <a href="{{ site.baseurl }}/" style="text-decoration: none; color: #0984e3; font-weight: bold;">← 返回首页</a>
            </div>
        </article>

        <div id="cusdis_wrapper" style="
            margin-top: 50px; 
            margin-bottom: 60px; 
            padding: 30px; 
            background-color: #fff; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        ">
            <h3 style="margin-top: 0; margin-bottom: 25px; color: #2d3436; font-size: 1.3rem;">发表评论</h3>

            <div id="cusdis_thread"
                data-host="https://cusdis.com"
                data-app-id="9ed3bc87-8c4b-40ae-afa6-907fb09cbf19"
                data-page-id="{{ page.url }}" 
                data-page-url="{{ page.url | absolute_url }}"
                data-page-title="{{ page.title }}"
                style="width: 100%; min-height: 380px;"
            ></div>
        </div>

        <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>

        <script>
          window.addEventListener('message', function(e) {
            try {
              // 尝试解析 Cusdis 发送的 JSON 数据
              const msg = JSON.parse(e.data);
              
              // 确认是 Cusdis 发出的高度调整请求
              if (msg.from === 'cusdis' && msg.event === 'resize') {
                const iframe = document.querySelector('#cusdis_thread iframe');
                if (iframe) {
                  // 将获取到的真实高度再 +30px 缓冲，强制写入并设为最高优先级（important）
                  const newHeight = msg.data + 30;
                  iframe.style.setProperty('height', newHeight + 'px', 'important');
                }
              }
            } catch (err) {
              // 忽略页面上其他无关的 message 信号
            }
          });
        </script>

    </div>
</body>
</html>
