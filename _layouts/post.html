<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }} | YIFAN</title> <link rel="stylesheet" href="{{ '/style.css' | relative_url }}"> </head>
<body>
    <nav class="navbar">
        <div class="container"><a href="{{ site.baseurl }}/" class="logo">YIFAN</a></div> </nav>
    <div class="container">
        <article class="widget" style="padding: 50px; margin-top: 40px;">
            <h1>{{ page.title }}</h1> <div class="post-meta">{{ page.date | date: "%Y-%m-%d" }}</div> <div class="post-body">
                {{ content }} </div>
        </article>
    </div>
</body>
</html>
